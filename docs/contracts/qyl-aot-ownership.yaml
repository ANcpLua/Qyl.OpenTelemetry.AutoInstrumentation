- contract_item_id: OTEL_DOTNET_AUTO_CONTRACT_002
  key: signals.traces.ASPNET
  lane: unsupported_nativeaot
  qyl_status: unsupported_nativeaot
  call_site_visibility: user_code
  payload_access: reflection_required
  evidence_level: none
  primary_owner: unsupported by qyl NativeAOT substrate
  evidence:
  - docs/coverage-matrix.md
  unsupported_reason: 'Classic ASP.NET (System.Web MVC/WebApi) executes only on .NET Framework 4.x inside
    IIS; System.Web does not exist on .NET 10, so no in-process mechanism is available to this managed
    substrate. Devil''s-advocate check (2026-07-18): Microsoft.AspNetCore.SystemWebAdapters covers apps
    mid-migration to ASP.NET Core, not the literal promise; rejected as a rescue.'
