name: qyl-otlp-collector-fixtures

# Uses a real OpenTelemetry Collector container, so this is Linux-only (GitHub-hosted macOS
# runners have no Docker).

on:
  push:
    branches:
      - main
  pull_request:

# One live run per ref: superseded pushes cancel their queued/running predecessors,
# so superseded work never wastes runner minutes.
concurrency:
  group: qyl-otlp-collector-fixtures-${{ github.ref }}
  cancel-in-progress: true

jobs:
  otlp-collector-fixtures:
    name: otlp collector fixtures
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Verify collector-backed OTLP transport fixtures
        run: python3 tools/verify-otlp-collector-fixtures.py
