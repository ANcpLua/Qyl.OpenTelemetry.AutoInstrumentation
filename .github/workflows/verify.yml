name: qyl-verify

# The no-Docker validation floor: the verify-*.py suite that proves contract invariants,
# public-API baselines, generator snapshots, package layout, projectreference behavior,
# xml-doc, options/disabled behavior, and the source + NativeAOT consumers. Run via the handoff
# orchestrator, minus the container-backed real demos (--no-demos -> verify-real-demos.yml) and
# the gates that have their own workflow.

on:
  push:
    branches:
      - main
  pull_request:

# One live run per ref: superseded pushes cancel their queued/running predecessors,
# so superseded work never wastes runner minutes.
concurrency:
  group: qyl-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Python verifier dependencies
        run: python3 -m pip install -r tools/requirements.txt

      - name: NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Run the no-Docker validation floor
        run: >-
          python3 tools/verify-aot-autoinstrumentation-goal.py
          --no-demos
          --skip "smoketest,webapi aot demo,otlp collector fixtures"
