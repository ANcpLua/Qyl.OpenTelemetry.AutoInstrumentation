name: qyl-webapi-aot-demo

on:
  pull_request:
  push:
    branches:
      - main

# One live run per ref: superseded pushes cancel their queued/running predecessors,
# so superseded work never wastes runner minutes.
concurrency:
  group: qyl-webapi-aot-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapi-aot-demo:
    name: webapi-aot-demo (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish and run NativeAOT web API demo
        run: python3 tools/verify-webapi-aot-demo.py
