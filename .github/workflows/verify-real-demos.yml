name: qyl-verify-real-demos

# The 28 container-backed real-demo verifiers (Kafka, Mongo, Redis, RabbitMQ, Postgres, MySQL,
# Oracle, Elasticsearch, gRPC, Azure, WCF, …). Each packs the runtime, builds + NativeAOT-
# publishes a real consumer, spins a testcontainer, and asserts emitted telemetry end-to-end.
# Linux-only (needs Docker for testcontainers). Heavy, so it runs post-merge on main and on
# demand — not on every feature push. Run the whole gate locally with:
#   python3 tools/verify-aot-autoinstrumentation-goal.py --demos-only

on:
  push:
    branches:
      - main
  workflow_dispatch:

# One live run per ref: superseded pushes cancel their queued/running predecessors,
# so superseded work never wastes runner minutes.
concurrency:
  group: qyl-verify-real-demos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-demos:
    name: real demos
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: NativeAOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Run the container-backed real-demo verifiers
        run: python3 tools/verify-aot-autoinstrumentation-goal.py --demos-only
