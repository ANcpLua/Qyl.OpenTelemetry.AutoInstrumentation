name: qyl-aot-publish-gate

# Pins the NativeAOT warning-cleanliness classification of the demo matrix (tools/verify-aot-publish-gate.py):
#   * CLEAN set must AOT-publish warning-clean under strict TreatWarningsAsErrors (catches a qyl
#     regression that introduces reflection / breaks AOT — the primary signal).
#   * VENDOR_WARNED set must still AOT-publish with warnings relaxed (hard-break detection), and a
#     "promotion" is flagged when an upstream library shipped AOT annotations and is now warning-clean.
#
# Heavy (up to 30 NativeAOT publishes x 2 OS), so — like verify-real-demos.yml — it runs post-merge on
# main, nightly, and on demand, NOT on every PR. The gate prebuilds the source generator into the
# standard artifacts/ layout (the PublishAot demos consume it as a prebuilt Analyzer DLL from there)
# and publishes with --disable-build-servers; per-ref workflow concurrency cancels superseded runs. Run locally: python3 tools/verify-aot-publish-gate.py --set all

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  aot-publish-gate:
    name: aot-publish-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Python verifier dependencies
        run: python3 -m pip install -r tools/requirements.txt

      - name: NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: AOT-publish warning-cleanliness gate (CLEAN regression + VENDOR_WARNED hard-break/promotion)
        run: python3 tools/verify-aot-publish-gate.py --set all
