name: qyl-aot-publish-gate

# Pins the NativeAOT warning-cleanliness classification of the demo matrix (tools/verify-aot-publish-gate.py):
#   * PR + push: the CLEAN set must AOT-publish warning-clean under strict TreatWarningsAsErrors
#     (catches a qyl regression that introduces reflection / breaks AOT — the primary signal).
#   * push to main: additionally publish the VENDOR_WARNED set with warnings relaxed to catch a hard
#     AOT break, and detect a "promotion" (an upstream library that shipped AOT annotations and is now
#     warning-clean, so it can move into the CLEAN set).
# No containers required — this is the fast AOT gate; the container-backed runtime verifiers stay in
# verify-real-demos.yml (post-merge). Run locally: python3 tools/verify-aot-publish-gate.py --set all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  aot-publish-gate:
    name: aot-publish-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - qyl-linux
          - qyl-macos

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: AOT warning-clean regression gate (CLEAN set)
        run: python3 tools/verify-aot-publish-gate.py --set clean

      - name: AOT hard-break + promotion detection (VENDOR_WARNED set)
        if: github.event_name == 'push'
        run: python3 tools/verify-aot-publish-gate.py --set warned
