name: qyl-aot-warning-gate

on:
  push:
  pull_request:

jobs:
  aot-warning-gate:
    name: aot warnings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish PackageReference and ProjectReference consumers with AOT warning gate
        run: bash tools/smoketest.sh
